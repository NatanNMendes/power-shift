<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/output.css" />
    <title>Power Shift - Official</title>
    <link rel="icon" type="image/x-icon" href="./images/favicon_io/favicon.ico">
</head>
<body>
    <div class="flex flex-col md:flex-row min-h-screen p-8 bg-gray-100">
        <div class="w-full md:w-2/3 bg-white p-8 rounded-lg shadow-md">
            <div class="grid grid-cols-3 gap-6 max-w-4xl mx-auto">
              <button class="flex flex-col justify-center items-center border border-gray-300 rounded-lg bg-gray-100 hover:bg-gray-200 transition duration-300 p-3">
                <img src="./images/mercado-pago.svg" alt="Icon 5" class="w-12 h-auto" />
              </button>                           
              <button class="flex flex-col justify-center items-center border border-gray-300 rounded-lg bg-gray-100 hover:bg-gray-200 transition duration-300 p-3">
                <img src="./images/asaas.svg" alt="Icon 5" class="w-12 h-auto" />
              </button>  
              <button class="flex flex-col justify-center items-center border border-gray-300 rounded-lg bg-gray-100 hover:bg-gray-200 transition duration-300 p-3">
                <img src="./images/paypal.svg" alt="Icon 5" class="w-12 h-auto" />
              </button>  
              </div>
              
          <div class="text-center text-gray-500 mb-4">Ou</div>
          <form class="space-y-4">
            <input type="email" placeholder="Email:" class="w-full p-3 border rounded" />
            <input type="text" placeholder="Nome no Cartão" class="w-full p-3 border rounded" />
            <input type="text" placeholder="Número do cartão" class="w-full p-3 border rounded" />
            <div class="flex space-x-4">
              <input type="text" placeholder="Data de Expiração (MM/YY)" class="w-1/2 p-3 border rounded" />
              <input type="text" placeholder="CVC" class="w-1/2 p-3 border rounded" />
            </div>
            <input type="text" placeholder="Endereço" class="w-full p-3 border rounded" />
            <div class="flex space-x-4">
              <input type="text" placeholder="Cidade" class="w-1/3 p-3 border rounded" />
              <input type="text" placeholder="Estado" class="w-1/3 p-3 border rounded" />
              <input type="text" placeholder="CEP" class="w-1/3 p-3 border rounded" />
            </div>
            <div class="flex items-center space-x-2">
              <input type="checkbox" id="same-address" class="w-4 h-4" />
              <label for="same-address" class="text-sm text-gray-600">
                O endereço de cobrança é o mesmo que o endereço de entrega</label>
            </div>
            <button class="w-full bg-red-600 text-white p-3 rounded-lg">Valor R$341.68</button>
          </form>
          <p class="text-sm text-gray-500 mt-3 text-center">🔒 Detalhes de pagamento armazenados em texto simples</p>
        </div>
      
        <!-- Right - Order Summary -->
        <div class="w-full md:w-1/3 mt-8 md:mt-0 md:ml-8 bg-white p-6 rounded-lg shadow-md">
          <h2 class="text-lg font-semibold mb-4">Order Summary</h2>
          <div class="space-y-4">
            <div class="flex justify-between text-sm">
              <span>Micro Backpack</span>
              <span>$70.00</span>
            </div>
            <div class="flex justify-between text-sm">
              <span>Small Stuff Satchel</span>
              <span>$180.00</span>
            </div>
            <div class="flex justify-between text-sm">
              <span>Carry Clutch</span>
              <span>$70.00</span>
            </div>
          </div>
          <div class="border-t mt-4 pt-4 space-y-2 text-sm">
            <div class="flex justify-between">
              <span>Subtotal</span>
              <span>$210.00</span>
            </div>
            <div class="flex justify-between text-green-600">
              <span>Discount</span>
              <span>- $24.00</span>
            </div>
            <div class="flex justify-between">
              <span>Taxes</span>
              <span>$23.68</span>
            </div>
            <div class="flex justify-between">
              <span>Shipping</span>
              <span>$22.00</span>
            </div>
          </div>
          <div class="border-t mt-4 pt-4 text-lg font-semibold flex justify-between">
            <span>Total</span>
            <span>$341.68</span>
          </div>
          <div class="mt-4">
            <input
              type="text"
              placeholder="Discount code"
              class="w-2/3 p-2 border rounded"
            />
            <button class="ml-2 px-4 py-2 bg-gray-300 rounded">Apply</button>
          </div>
        </div>
      </div>
      
</body>
</html>
